<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitragem GPS - Total</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #121212; color: white; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 20px; border: 1px solid #333; max-width: 500px; margin: 0 auto; }
        #freguesia { font-size: 32px; color: #00ff88; margin: 20px 0; font-weight: bold; min-height: 40px; }
        #concelho { font-size: 20px; color: #888; margin-bottom: 30px; }
        button { background: #007bff; color: white; border: none; padding: 20px; border-radius: 12px; width: 100%; font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { background: #0056b3; transform: scale(0.98); }
        .info { margin-top: 20px; font-size: 12px; color: #444; }
    </style>
</head>
<body>

<div class="card">
    <h1>Localizador Oficial</h1>
    <p>3.091 Freguesias de Portugal</p>
    
    <div id="freguesia">Pronto para detetar</div>
    <div id="concelho">---</div>
    
    <button onclick="localizar()">ONDE ESTOU AGORA?</button>
    
    <div class="info" id="coords">Lat: -- | Lon: --</div>
</div>

<script>
    function localizar() {
        const fDisplay = document.getElementById('freguesia');
        const cDisplay = document.getElementById('concelho');
        const coDisplay = document.getElementById('coords');

        fDisplay.innerHTML = "A consultar satélites...";

        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            coDisplay.innerHTML = `Lat: ${lat.toFixed(4)} | Lon: ${lon.toFixed(4)}`;

            // Chamada à API oficial do OpenStreetMap
            const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    console.log(data.address);
                    // Em Portugal, a freguesia vem muitas vezes na chave 'village', 'suburb' ou 'neighbourhood'
                    const freguesia = data.address.settlement || data.address.village || data.address.suburb || data.address.neighbourhood || data.address.city_district || "Freguesia não identificada";
                    const concelho = data.address.city || data.address.town || data.address.municipality || "";

                    fDisplay.innerHTML = freguesia;
                    cDisplay.innerHTML = concelho;
                })
                .catch(err => {
                    fDisplay.innerHTML = "Erro na consulta";
                    console.error(err);
                });

        }, (err) => {
            fDisplay.innerHTML = "GPS Bloqueado";
            alert("Por favor, ativa a localização no tablet.");
        }, { enableHighAccuracy: true });
    }
</script>

</body>
</html>
