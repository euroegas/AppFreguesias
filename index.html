<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arbitragem PRO</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 10px; }
        
        /* A CAIXA DE DIAGNÓSTICO AGORA NO TOPO */
        #debug { 
            background: #222; 
            color: #0f0; 
            font-family: monospace; 
            font-size: 10px; 
            text-align: left; 
            padding: 10px; 
            margin-bottom: 20px; 
            border: 1px solid #444;
            max-height: 150px;
            overflow: auto;
            display: block !important; /* Força a aparição */
        }

        .box { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        h2 { color: #00ff88; font-size: 30px; margin: 10px 0; }
        button { background: #007bff; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 10px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="debug">Aguardando clique no botão... (Se vês isto, o código atualizou)</div>

    <div class="box">
        <p style="color: #888;">LOCALIZADOR</p>
        <h2 id="freguesia">---</h2>
        <p id="concelho" style="color: #888;">---</p>
        <button onclick="localizar()">ONDE ESTOU?</button>
    </div>

<script>
    function localizar() {
        const debug = document.getElementById('debug');
        const fDisplay = document.getElementById('freguesia');
        
        debug.innerHTML = "A tentar GPS...";
        fDisplay.innerHTML = "A LER...";

        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;

            debug.innerHTML = "GPS OK. A chamar servidor...";

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    // MOSTRA TUDO NA CAIXA DE DEBUG
                    debug.innerHTML = "RESPOSTA: " + JSON.stringify(data.address, null, 2);

                    const a = data.address;
                    // Tenta encontrar a freguesia em qualquer gaveta
                    const nome = a.suburb || a.village || a.neighbourhood || a.parish || a.township || a.city_district || a.hamlet || "NÃO ENCONTRADO";
                    const cidade = a.city || a.town || a.municipality || "PORTUGAL";

                    fDisplay.innerHTML = nome;
                    document.getElementById('concelho').innerHTML = cidade;
                })
                .catch(err => {
                    debug.innerHTML = "ERRO NA API: " + err;
                });

        }, (err) => {
            debug.innerHTML = "ERRO NO GPS: " + err.message;
        }, { enableHighAccuracy: true });
    }
</script>
</body>
</html>
