<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arbitragem</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">

    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --primary: #007bff;
            --accent: #00ff88;
            --text-main: #ffffff;
            --text-dim: #777777;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .app-container {
            width: 85%;
            max-width: 380px;
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid #2a2a2a;
            text-align: center;
        }

        h1 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-dim);
            margin: 0 0 30px 0;
        }

        .result-box {
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #freguesia {
            font-size: 32px;
            font-weight: 900;
            color: var(--accent);
            line-height: 1.1;
            margin-bottom: 12px;
            text-transform: uppercase;
            word-wrap: break-word;
        }

        #concelho {
            font-size: 19px;
            color: var(--text-dim);
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 18px;
            width: 100%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 123, 255, 0.4);
        }

        /* Caixa de diagnóstico para apanhar o erro */
        .debug-box {
            width: 85%;
            max-width: 380px;
            margin-top: 15px;
            background: #222;
            border: 1px dashed #555;
            padding: 10px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 11px;
            color: #aaa;
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .status-bar {
            margin-top: 20px;
            font-size: 9px;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Arbitragem</h1>
    
    <div class="result-box">
        <div id="freguesia">SISTEMA ATIVO</div>
        <div id="concelho">AGUARDANDO COMANDO</div>
    </div>

    <button onclick="localizar()">DETETAR LOCALIZAÇÃO</button>

    <div class="status-bar" id="coords">GPS STATUS: STANDBY</div>
</div>

<!-- Caixa invisível que mostra o erro real se ele acontecer -->
<div class="debug-box" id="debug">Dados brutos da API aparecerão aqui para diagnóstico...</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        });
    }

    function localizar() {
        const fDisplay = document.getElementById('freguesia');
        const cDisplay = document.getElementById('concelho');
        const coDisplay = document.getElementById('coords');
        const debugDisplay = document.getElementById('debug');

        fDisplay.innerHTML = "A LOCALIZAR...";
        cDisplay.innerHTML = "A LER SATÉLITES";
        debugDisplay.innerHTML = "A aguardar dados da API...";

        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            coDisplay.innerHTML = `L1: ${lat.toFixed(6)} | L2: ${lon.toFixed(6)}`;

            const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    const addr = data.address;
                    if (!addr) throw new Error("Objeto address vazio");

                    // Mostra o resultado real recebido na caixa cinzenta em baixo
                    debugDisplay.innerHTML = JSON.stringify(addr, null, 2);

                    // Varre exaustivamente todas as chaves possíveis em Portugal
                    let fregFinal = addr.suburb || 
                                    addr.village || 
                                    addr.neighbourhood || 
                                    addr.parish || 
                                    addr.city_district || 
                                    addr.township || 
                                    addr.hamlet || 
                                    addr.settlement ||
                                    addr.isolated_dwelling ||
                                    addr.locality ||
                                    addr.municipality || // Caso a API devolva direto na raiz do concelho
                                    "FREGUESIA NÃO DETETADA";

                    let concFinal = addr.city || 
                                    addr.town || 
                                    addr.municipality || 
                                    addr.county || 
                                    addr.region ||
                                    "PORTUGAL";

                    fDisplay.innerHTML = fregFinal;
                    cDisplay.innerHTML = concFinal;
                })
                .catch(err => {
                    fDisplay.innerHTML = "ERRO DE REDE";
                    cDisplay.innerHTML = "VERIFIQUE LIGAÇÃO";
                    debugDisplay.innerHTML = err.toString();
                });

        }, (err) => {
            fDisplay.innerHTML = "SINAL BLOQUEADO";
            cDisplay.innerHTML = "ATIVE O GPS";
        }, { 
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0 
        });
    }
</script>

</body>
</html>
