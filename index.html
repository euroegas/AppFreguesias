<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitragem - Freguesias de Portugal</title>
    <!-- Bibliotecas Necessárias -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 30px; background: #121212; color: white; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #nome-freguesia { font-size: 30px; color: #00ff88; margin: 20px 0; font-weight: bold; }
        #nome-concelho { font-size: 20px; color: #aaa; margin-bottom: 20px; }
        button { background: #007bff; color: white; border: none; padding: 20px; border-radius: 10px; width: 100%; font-size: 20px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>Localizador GPS</h1>
    <div id="nome-freguesia">A carregar mapa...</div>
    <div id="nome-concelho"></div>
    <button onclick="detectar()">ONDE ESTOU AGORA?</button>
    <div id="status">A aguardar sinal...</div>
</div>

<script>
    let mapaReal = null;

    // LINK DIRETO PARA O GEOJSON OFICIAL (Versão Otimizada para Web)
    const urlMapa = "https://raw.githubusercontent.com/vitorspaco/freguesias-portugal/master/freguesias-portugal.json";

    fetch(urlMapa)
        .then(res => {
            if (!res.ok) throw new Error("Erro ao carregar mapa");
            return res.json();
        })
        .then(data => {
            mapaReal = data;
            document.getElementById('nome-freguesia').innerHTML = "Mapa de Portugal Pronto";
            document.getElementById('status').innerHTML = "Sistema Online";
        })
        .catch(err => {
            document.getElementById('nome-freguesia').innerHTML = "Erro de Ligação";
            document.getElementById('status').innerHTML = "Tenta recarregar a página";
        });

    function detectar() {
        if (!mapaReal) return;
        
        document.getElementById('nome-freguesia').innerHTML = "A calcular...";
        document.getElementById('status').innerHTML = "A ler satélites GPS...";

        navigator.geolocation.getCurrentPosition((pos) => {
            const ponto = turf.point([pos.coords.longitude, pos.coords.latitude]);
            let encontrou = false;

            turf.featureEach(mapaReal, (feature) => {
                if (turf.booleanPointInPolygon(ponto, feature)) {
                    const fNome = feature.properties.freguesia;
                    const cNome = feature.properties.concelho;
                    
                    document.getElementById('nome-freguesia').innerHTML = fNome;
                    document.getElementById('nome-concelho').innerHTML = cNome;
                    document.getElementById('status').innerHTML = "Localizado com sucesso!";
                    encontrou = true;
                }
            });

            if (!encontrou) {
                document.getElementById('nome-freguesia').innerHTML = "Fora de Portugal";
                document.getElementById('status').innerHTML = "Coordenadas: " + pos.coords.latitude.toFixed(4) + ", " + pos.coords.longitude.toFixed(4);
            }
        }, (err) => {
            document.getElementById('nome-freguesia').innerHTML = "GPS Bloqueado";
            document.getElementById('status').innerHTML = "Ativa a localização no tablet";
        }, { enableHighAccuracy: true });
    }
</script>

</body>
</html>
