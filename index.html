<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arbitragem</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">

    <style>
        :root {
            --bg: #0b0b0b;
            --card: #161616;
            --accent: #00ff88;
            --btn: #007bff;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .container {
            width: 85%;
            max-width: 380px;
            background: var(--card);
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid #252525;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .label { color: #555; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        
        #freguesia {
            font-size: 32px;
            font-weight: 900;
            color: var(--accent);
            margin: 10px 0;
            text-transform: uppercase;
            line-height: 1.1;
        }

        #concelho {
            color: #888;
            font-size: 18px;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button {
            background: var(--btn);
            color: white;
            border: none;
            padding: 22px;
            width: 100%;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.3);
            cursor: pointer;
        }

        button:active { transform: scale(0.96); opacity: 0.9; }

        #coords { margin-top: 30px; font-size: 9px; color: #333; font-family: monospace; }
    </style>
</head>
<body>

    <div class="container">
        <div class="label">Localizador Arbitragem</div>
        <div id="freguesia">PRONTO</div>
        <div id="concelho">Toque para detetar</div>
        
        <button onclick="localizar()">ONDE ESTOU?</button>
        
        <div id="coords">SINAL: STANDBY</div>
    </div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(()=>{});
    }

    function localizar() {
        const fDisp = document.getElementById('freguesia');
        const cDisp = document.getElementById('concelho');
        const coDisp = document.getElementById('coords');

        fDisp.innerHTML = "A LER...";
        cDisp.innerHTML = "A CONSULTAR";

        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            coDisp.innerHTML = `LAT: ${lat.toFixed(5)} | LON: ${lon.toFixed(5)}`;

            const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    const a = data.address;
                    
                    // LÓGICA PRIORITÁRIA PARA 'TOWN'
                    // 1. Tenta 'town' (Monte Gordo)
                    // 2. Se não houver, tenta as outras alternativas
                    let principal = a.town || a.suburb || a.village || a.hamlet || a.parish || a.neighbourhood || "DESCONHECIDO";
                    
                    // O Concelho fica com a cidade principal ou município
                    let secundario = a.city || a.municipality || a.county || "PORTUGAL";

                    fDisp.innerHTML = principal;
                    cDisp.innerHTML = secundario;
                })
                .catch(() => {
                    fDisp.innerHTML = "ERRO REDE";
                });

        }, () => {
            fDisp.innerHTML = "GPS OFF";
        }, { enableHighAccuracy: true });
    }
</script>
</body>
</html>
